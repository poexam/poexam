name: CI

on:
  - push
  - pull_request

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-26.04
          - ubuntu-26.04-arm
          - macos-15
          - windows-2025

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo apt-get update -qq
          sudo apt-get --yes --no-install-recommends install gettext

      - name: Check Rust code formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D clippy::pedantic

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
